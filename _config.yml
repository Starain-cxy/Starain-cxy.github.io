# ====================== 社交链接 ======================
github_username: Starain-cxy

# ====================== 个人研究关键词 ======================
keywords: Statistics, Conformal Prediction, Prediction-Powered Inference, Time Series Forecasting, Data Mining, Mathematical Modeling

# ====================== 专业高分课程（教育页展示） ======================
courses:
  - name: 数学分析
    score: 97
  - name: 高等代数
    score: 94
  - name: 数理统计
    score: 98
  - name: 回归分析
    score: 99
  - name: 随机过程
    score: 97
  - name: 数据挖掘
    score: 99

# ====================== 技能标签展示 ======================
skills:
  Programming: Python, Java, MATLAB
  Typesetting & Writing: LaTeX, Markdown
  Office Tools: Word, Excel, PowerPoint
  Language: CET-4(604), CET-6(516), Fluent reading of English academic papers

# ====================== 学术文献库 ======================
scholar:
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: publications.bib
  sort_by: year
  order: descending
  group_by: year
  group_order: descending

bibtex_bibfiles:
  - assets/bib/publications.bib

# ====================== 收藏集 ======================
collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true

# ====================== 分页 ======================
pagination:
  enabled: true
  per_page: 5

blog_name: Blog
blog_description: 个人博客

# ====================== Jekyll 设置 ======================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

sass:
  style: compressed

# ====================== 底部版权信息 ======================
footer_text: >
  © 2026 陈星宇. Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> & <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme. Hosted on GitHub Pages.

