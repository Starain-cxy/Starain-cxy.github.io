# ====================== 基础个人信息 ======================
title: 陈星宇
first_name: 星宇
last_name: 陈
description: >
  你好，我是东华大学的一名本科生。很希望和你讨论统计学。
avatar: assets/img/avatar.png

# 地理位置
location: Songjiang District, Shanghai, China

# 网站域名配置
url: "https://Starain-cxy.github.io"
baseurl: ""
repository: Starain-cxy/Starain-cxy.github.io

# 主题配置 — 固定到 v0.16.3（最新支持 remote_theme 的版本）
remote_theme: alshedivat/al-folio@v0.16.3

lang: zh-CN
icon: 📊

# 插件
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-scholar
  - jekyll-email-protect
  - jekyll-socials
  - jekyll-archives-v2
  - jekyll-link-attributes
  - jekyll-get-json
  - jemoji

# ====================== 布局设置 ======================
navbar_fixed: true
footer_fixed: true
search_enabled: false
back_to_top: true
max_width: 930px

# ====================== 功能开关 ======================
enable_math: true
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: true
enable_masonry: true
enable_tooltips: false
enable_medium_zoom: true
enable_progressbar: true
enable_google_analytics: false
enable_cronitor_analytics: false
enable_pirsch_analytics: false
enable_openpanel_analytics: false

# 关闭需要外部工具的功能
imagemagick:
  enabled: false

