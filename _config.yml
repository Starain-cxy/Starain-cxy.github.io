# ====================== 基础个人信息 ======================
title: 陈星宇
name: 陈星宇
# 首页开篇文案
description: >
  你好，我是东华大学的一名本科生。
  很希望和你讨论统计学。
# 头像存放路径，证件照上传至 assets/img/avatar.jpg
