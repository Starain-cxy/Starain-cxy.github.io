# 主题配置 al-folio 学术主题
remote_theme: alshedivat/al-folio

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll-scholar
  - jekyll-email-protect

theme_mode: light # 可选 light / dark / auto
mathjax: true # 开启数学公式，统计专业必备

# ====================== 分页配置（jekyll-paginate-v2） ======================
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'
  sort_field: 'date'
  sort_reverse: true

# ====================== 学术引用样式（jekyll-scholar） ======================
scholar:
  style: apa
  locale: en
  sort_by: year
  order: descending

